name: NuGet

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore Hamon.sln -p:UseVendoredMonoGame=false
      - name: Test
        run: dotnet test Hamon.sln -c Release --no-restore -p:UseVendoredMonoGame=false
      - name: Pack
        shell: bash
        run: |
          version_args=()
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ ! "$version" =~ ^0\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tag must be a pre-1.0 SemVer tag such as v0.1.0-alpha.2" >&2
              exit 1
            fi
            version_args+=("-p:PackageVersion=$version")
          fi
          dotnet pack src/Hamon/Hamon.csproj -c Release --no-restore -o artifacts -p:UseVendoredMonoGame=false "${version_args[@]}"
          dotnet pack src/Hamon.Fonts/Hamon.Fonts.csproj -c Release --no-restore -o artifacts -p:UseVendoredMonoGame=false "${version_args[@]}"
          dotnet pack src/Hamon.MonoGame/Hamon.MonoGame.csproj -c Release --no-restore -o artifacts -p:UseVendoredMonoGame=false "${version_args[@]}"
      - uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.*nupkg
      - name: NuGet login
        if: github.ref_type == 'tag'
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: hckaye
      - name: Publish to NuGet.org
        if: github.ref_type == 'tag'
        run: dotnet nuget push 'artifacts/*.nupkg' --api-key '${{ steps.nuget-login.outputs.NUGET_API_KEY }}' --source https://api.nuget.org/v3/index.json --skip-duplicate
